title: Redirects
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: from
            field:
              type: text
              validate:
                - required
              display: From
              instructions_position: above
              listable: hidden
              visibility: visible
              replicator_preview: true
              input_type: text
              antlers: false
              hide_display: false
              width: 50
          -
            handle: to
            field:
              input_type: text
              antlers: false
              type: text
              validate:
                - required
              display: To
              icon: text
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 50
          -
            handle: redirect_type
            field:
              options:
                301: null
                302: null
                307: null
                308: null
              taggable: false
              push_tags: false
              multiple: false
              clearable: false
              searchable: true
              cast_booleans: false
              type: select
              display: 'Redirect Type'
              icon: select
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 50
              default: '301'
          -
            handle: is_regex
            field:
              type: toggle
              display: 'Is Regex?'
              instructions: 'Automatically detected, but can be overridden.'
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 50
              default: false
          -
            handle: sites
            field:
              mode: select
              type: sites
              display: Sites
              validate:
                - required
              icon: sites
              localizable: false
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              width: 50
          -
            handle: id
            field:
              type: text
              display: id
              icon: text
              listable: hidden
              instructions_position: above
              visibility: hidden
              replicator_preview: true
              hide_display: false
